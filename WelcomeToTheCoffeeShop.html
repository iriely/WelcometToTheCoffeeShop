    <title>Responsive Room Header</title>
    <style>
        /* Reset default margins */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Header styling */
        header {
            height: 40vh; /* 40% of viewport height */
            min-height: 200px; /* Prevents it from being too small */
            background-image: urlhttps://wallpaperaccess.com/full/1217317.jpg); /* Replace with your image */
            background-size: cover; /* Fill the header area */
            background-position: center; /* Center the image */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.7);
            padding: 0 10px;
        }

        /* Header text */
        header h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        /* Responsive text size */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
